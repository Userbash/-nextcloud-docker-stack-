---
name: Local Checks & Lints

'on':
  push:
    branches: [ "production", "dev" ]
  pull_request:
    branches: [ "production" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          WORKSPACE_DIR="${GITHUB_WORKSPACE}"
          cd "$WORKSPACE_DIR"
          # Exclude data and .git to avoid permission noise in local act runs.
          find . -type d \( -name 'data' -o -name '.git' \) -prune -o -type f -name '*.sh' -print0 2>/dev/null | xargs -0 -r shellcheck

      - name: Run yamllint
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y yamllint
          WORKSPACE_DIR="${GITHUB_WORKSPACE}"
          cd "$WORKSPACE_DIR"
          bash scripts/validate-yaml.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@c541c155fee3b4d55216515b13bc4ec882103f8c # v2.32.0
        with:
          php-version: '8.2'
          
      - name: Lint PHP Configs
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE}"
          cd "$WORKSPACE_DIR"
          find . -name "*.php" -print0 2>/dev/null | xargs -0 -r -n1 php -l
