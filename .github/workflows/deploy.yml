name: Deploy Nextcloud Stack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DOMAIN: ${{ secrets.DOMAIN }}
          TRUSTED_DOMAINS: ${{ secrets.TRUSTED_DOMAINS }}
          EMAIL: ${{ secrets.EMAIL }}
          OVERWRITEPROTOCOL: ${{ secrets.OVERWRITEPROTOCOL }}
          PHP_MEMORY_LIMIT: ${{ secrets.PHP_MEMORY_LIMIT }}
          PHP_UPLOAD_MAX_FILESIZE: ${{ secrets.PHP_UPLOAD_MAX_FILESIZE }}
          PHP_POST_MAX_SIZE: ${{ secrets.PHP_POST_MAX_SIZE }}
          PHP_MAX_EXECUTION_TIME: ${{ secrets.PHP_MAX_EXECUTION_TIME }}
          PHP_OPCACHE_ENABLE: ${{ secrets.PHP_OPCACHE_ENABLE }}
          PHP_OPCACHE_MEMORY_CONSUMPTION: ${{ secrets.PHP_OPCACHE_MEMORY_CONSUMPTION }}
          PHP_APCU_ENABLED: ${{ secrets.PHP_APCU_ENABLED }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,ADMIN_USER,ADMIN_PASSWORD,DOMAIN,TRUSTED_DOMAINS,EMAIL,OVERWRITEPROTOCOL,PHP_MEMORY_LIMIT,PHP_UPLOAD_MAX_FILESIZE,PHP_POST_MAX_SIZE,PHP_MAX_EXECUTION_TIME,PHP_OPCACHE_ENABLE,PHP_OPCACHE_MEMORY_CONSUMPTION,PHP_APCU_ENABLED,REDIS_HOST,REDIS_PORT
          script: |
            set -euo pipefail
            set +o history
            INSTALL_DIR="/home/nextcloud-stack/nextcloud-docker-stack"
            
            sudo mkdir -p "$INSTALL_DIR"
            sudo chown -R nextcloud-stack:nextcloud-stack /home/nextcloud-stack
            
            # Allow git operations in this directory
            sudo -u nextcloud-stack git config --global --add safe.directory "$INSTALL_DIR"
            
            cd "$INSTALL_DIR" || exit 1
            sudo -u nextcloud-stack git fetch origin production
            sudo -u nextcloud-stack git reset --hard origin/production

            export POSTGRES_DB="$DB_NAME"
            export POSTGRES_USER="$DB_USER"
            export POSTGRES_PASSWORD="$DB_PASSWORD"
            export POSTGRES_HOST="$DB_HOST"
            export NEXTCLOUD_ADMIN_USER="$ADMIN_USER"
            export NEXTCLOUD_ADMIN_PASSWORD="$ADMIN_PASSWORD"
            export NEXTCLOUD_DOMAIN="$DOMAIN"
            export NEXTCLOUD_TRUSTED_DOMAINS="$TRUSTED_DOMAINS"
            export LETSENCRYPT_EMAIL="$EMAIL"
            export OVERWRITEPROTOCOL="$OVERWRITEPROTOCOL"
            export PHP_MEMORY_LIMIT="$PHP_MEMORY_LIMIT"
            export PHP_UPLOAD_MAX_FILESIZE="$PHP_UPLOAD_MAX_FILESIZE"
            export PHP_POST_MAX_SIZE="$PHP_POST_MAX_SIZE"
            export PHP_MAX_EXECUTION_TIME="$PHP_MAX_EXECUTION_TIME"
            export PHP_OPCACHE_ENABLE="$PHP_OPCACHE_ENABLE"
            export PHP_OPCACHE_MEMORY_CONSUMPTION="$PHP_OPCACHE_MEMORY_CONSUMPTION"
            export PHP_APCU_ENABLED="$PHP_APCU_ENABLED"
            export REDIS_HOST="$REDIS_HOST"
            export REDIS_PORT="$REDIS_PORT"

            sudo -E -u nextcloud-stack bash setup.sh --domain "$DOMAIN" --email "$EMAIL" --rootless
            
            unset POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD POSTGRES_HOST NEXTCLOUD_ADMIN_USER NEXTCLOUD_ADMIN_PASSWORD NEXTCLOUD_DOMAIN NEXTCLOUD_TRUSTED_DOMAINS LETSENCRYPT_EMAIL OVERWRITEPROTOCOL PHP_MEMORY_LIMIT PHP_UPLOAD_MAX_FILESIZE PHP_POST_MAX_SIZE PHP_MAX_EXECUTION_TIME PHP_OPCACHE_ENABLE PHP_OPCACHE_MEMORY_CONSUMPTION PHP_APCU_ENABLED REDIS_HOST REDIS_PORT DB_NAME DB_USER DB_PASSWORD DB_HOST ADMIN_USER ADMIN_PASSWORD DOMAIN TRUSTED_DOMAINS EMAIL OVERWRITEPROTOCOL PHP_MEMORY_LIMIT PHP_UPLOAD_MAX_FILESIZE PHP_POST_MAX_SIZE PHP_MAX_EXECUTION_TIME PHP_OPCACHE_ENABLE PHP_OPCACHE_MEMORY_CONSUMPTION PHP_APCU_ENABLED REDIS_HOST REDIS_PORT

