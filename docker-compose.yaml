version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: nextcloud-traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http3
      - --providers.file.directory=/etc/traefik/dynamic
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
      - "8081:8080"
    volumes:
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
      - ./config/ssl:/etc/traefik/certs:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true
      - label=disable

  db:
    image: docker.io/library/postgres:16-alpine
    container_name: nextcloud-db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: nextcloud-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data:Z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true

  app:
    image: docker.io/library/nextcloud:27-apache
    container_name: nextcloud-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - nextcloud_html:/var/www/html:Z
      - nextcloud_config:/var/www/html/config:Z
      - nextcloud_data:/var/www/html/data:Z
      - nextcloud_apps:/var/www/html/custom_apps:Z
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEPROTOCOL: ${OVERWRITEPROTOCOL}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE}
      PHP_OPCACHE_MEMORY_CONSUMPTION: ${PHP_OPCACHE_MEMORY_CONSUMPTION}
      PHP_APCU_ENABLED: ${PHP_APCU_ENABLED}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      TRUSTED_PROXIES: traefik
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - "traefik.http.routers.nextcloud-http.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - traefik.http.routers.nextcloud-http.entrypoints=web
      - traefik.http.routers.nextcloud-http.service=nextcloud
      - traefik.http.routers.nextcloud-http.middlewares=nextcloud-headers,nextcloud-dav,nextcloud-compress
      - "traefik.http.routers.nextcloud-https.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - traefik.http.routers.nextcloud-https.entrypoints=websecure
      - traefik.http.routers.nextcloud-https.tls=true
      - traefik.http.routers.nextcloud-https.service=nextcloud
      - traefik.http.routers.nextcloud-https.middlewares=nextcloud-headers,nextcloud-dav,nextcloud-compress
      - traefik.http.services.nextcloud.loadbalancer.server.port=80
      - traefik.http.middlewares.nextcloud-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.nextcloud-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.nextcloud-headers.headers.stsPreload=true
      - traefik.http.middlewares.nextcloud-headers.headers.customFrameOptionsValue=SAMEORIGIN
      - traefik.http.middlewares.nextcloud-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.nextcloud-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.nextcloud-headers.headers.customResponseHeaders.Permissions-Policy=geolocation=(),microphone=(),camera=()
      - traefik.http.middlewares.nextcloud-headers.headers.customResponseHeaders.Referrer-Policy=no-referrer-when-downgrade
      - traefik.http.middlewares.nextcloud-dav.redirectregex.regex=^https?://([^/]+)/\.well-known/(card|cal)dav
      - traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/
      - traefik.http.middlewares.nextcloud-compress.compress=true

networks:
  nextcloud_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  nextcloud_html:
  nextcloud_config:
  nextcloud_data:
  nextcloud_apps:
  traefik_certs:
