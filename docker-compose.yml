version: '3.8'

services:
  db:
    image: docker.io/library/postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: nextcloud-db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true

  app:
    image: docker.io/library/nextcloud:27-apache@sha256:cbbe16adf3df9246c49d1faade9788b6c792d64b09a76c3372ee2b49294ac6a7
    container_name: nextcloud-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nextcloud_html:/var/www/html:Z
      - nextcloud_config:/var/www/html/config:Z
      - nextcloud_data:/var/www/html/data:Z
      - nextcloud_apps:/var/www/html/custom_apps:Z
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEPROTOCOL: ${OVERWRITEPROTOCOL}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME}
      PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE}
      PHP_OPCACHE_MEMORY_CONSUMPTION: ${PHP_OPCACHE_MEMORY_CONSUMPTION}
      PHP_APCU_ENABLED: ${PHP_APCU_ENABLED}
    networks:
      - nextcloud_network
    security_opt:
      - no-new-privileges:true

networks:
  nextcloud_network:
    driver: bridge

volumes:
  db_data:
  nextcloud_html:
  nextcloud_config:
  nextcloud_data:
  nextcloud_apps:
